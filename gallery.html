<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Indian High School</title>

  <link rel="stylesheet" href="css/style.css">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* NAVBAR */
.header{
  position:fixed;
  width:100%;
  top:0;
  left:0;
  z-index:1000;
  transition:0.3s;
}

/* NAV CONTAINER */
.nav-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 5%;
}

/* LOGO */
.logo img{
  height:65px;
  
}

/* LINKS */
.nav-links{
  display:flex;
  list-style:none;
}

.nav-links li{
  margin-left:25px;
}

.nav-links a{
  text-decoration:none;
  color:#000000; /* visible on video */
  font-weight:500;
  transition:0.3s;
}

.nav-links a:hover{
  color:#0077ff;
}

/* SCROLL NAVBAR */
.header.scrolled{
  background:#ffffffa1;
  backdrop-filter: blur(12px);          /* 🔥 main blur */
  -webkit-backdrop-filter: blur(12px); 
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.header.scrolled .nav-links a{
  color:#111;
}

.header.scrolled .logo img{
  filter:none;
}

/* MOBILE */
.menu-toggle{
  display:none;
  font-size:1.6rem;
  color:#fff;
  cursor:pointer;
}

@media(max-width:768px){

  .menu-toggle{
    display:block;
  }

  .nav-links{
    position:absolute;
    top:70px;
    right:-100%;
    flex-direction:column;
    background:#fff;
    width:220px;
    padding:20px;
    transition:0.3s;
  }

  .nav-links li{
    margin:15px 0;
  }

  .nav-links a{
    color:#111;
  }

  .nav-links.active{
    right:0;
  }
}

/* GALLERY GRID FIX */
.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding-top: 100px;
}

/* IMAGE BOX */
.gallery-item {
  width: 100%;
  aspect-ratio: 4/3;   /* 🔥 forces same size */
  overflow: hidden;
  border-radius: 15px;
}

/* IMAGE */
.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;   /* 🔥 keeps images aligned */
  display: block;
  transition: 0.4s ease;
}

/* HOVER */
.gallery-item:hover img {
  transform: scale(1.08);
}
</style>
</head>

<body>

<script>
  // Navbar scroll effect
const header = document.querySelector(".header");

window.addEventListener("scroll", () => {
  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});
// Mobile menu toggle
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});

</script>
