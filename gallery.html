<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Indian High School</title>

  <link rel="stylesheet" href="css/style.css">
<style>
/* NAVBAR */
.header {
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  z-index: 1000;
  transition: 0.3s;
  background-color: whitesmoke;
}

/* CONTAINER */
.nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 8%;
}

/* LOGO */
.logo {
  font-weight: 700;
  font-size: 1.2rem;
  color: #111;
}

/* LINKS */
.nav-links {
  display: flex;
  list-style: none;
}

.nav-links li {
  margin-left: 25px;
}

.nav-links a {
  text-decoration: none;
  color: #111;
  font-weight: 500;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #0077ff;
}

/* MOBILE MENU */
.menu-toggle {
  display: none;
  font-size: 1.5rem;
  cursor: pointer;
}

/* SCROLL EFFECT */
.header.scrolled {
  background: #ffffff;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: -100%;
    background: #ffffff;
    flex-direction: column;
    width: 200px;
    padding: 20px;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  }

  .nav-links li {
    margin: 15px 0;
  }

  .nav-links.active {
    right: 0;
  }
}
/* GALLERY GRID FIX */
.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding-top: 100px;
}

/* IMAGE BOX */
.gallery-item {
  width: 100%;
  aspect-ratio: 4/3;   /* 🔥 forces same size */
  overflow: hidden;
  border-radius: 15px;
}

/* IMAGE */
.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;   /* 🔥 keeps images aligned */
  display: block;
  transition: 0.4s ease;
}

/* HOVER */
.gallery-item:hover img {
  transform: scale(1.08);
}
</style>
</head>

<body>
<!-- NAVBAR -->
<header class="header">

  <div class="nav-container">

    <!-- LOGO -->
    <div class="logo">
      Indian High School
    </div>

    <!-- NAV LINKS -->
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html#home">Home</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#facilities">Facilities</a></li>
      <li><a href="index.html#academics">Academics</a></li>
      <li><a href="index.html#gallery">Gallery</a></li>
      <li><a href="index.html#contact">Admissions</a></li>
    </ul>

    <!-- HAMBURGER -->
    <div class="menu-toggle" id="menuToggle">
      ☰
    </div>

  </div>

</header>
<section class="gallery-page">

    <div class="gallery-container">

      <div class="gallery-item">
        <img src="https://res.cloudinary.com/dkhmpija5/image/upload/v1775758810/8_ew4dqk.jpg" alt="">
      </div>

      <div class="gallery-item">
        <img src="https://res.cloudinary.com/dkhmpija5/image/upload/v1775758850/7_ymnuuv.jpg" alt="">
      </div>

      <div class="gallery-item">
        <img src="https://res.cloudinary.com/dkhmpija5/image/upload/v1775758843/6_k0vfol.jpg" alt="">
      </div>

      <div class="gallery-item">
        <img src="https://res.cloudinary.com/dkhmpija5/image/upload/v1775758817/4_ud7pbe.jpg" alt="">
      </div>

      <div class="gallery-item">
        <img src="https://res.cloudinary.com/dkhmpija5/image/upload/v1775758815/1_rhufpx.jpg" alt="">
      </div>

      <div class="gallery-item">
        <img src="https://res.cloudinary.com/dkhmpija5/image/upload/v1775758814/5_h2ffea.jpg" alt="">
      </div>

    </div>

</section>
<script>
  // Navbar scroll effect
const header = document.querySelector(".header");

window.addEventListener("scroll", () => {
  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});
// Mobile menu toggle
const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});

</script>
</body>
</html>
